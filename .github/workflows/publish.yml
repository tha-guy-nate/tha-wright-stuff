name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Build
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  create-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Extract changelog section
        id: notes
        run: |
          python3 - <<'EOF'
          import os, re, sys
          version = os.environ["TAG"].lstrip("v")
          text = open("CHANGELOG.md").read()
          m = re.search(
              rf"(?m)^(## \[{re.escape(version)}\].*?)(?=^## \[|\Z)",
              text,
              re.DOTALL,
          )
          if not m:
              sys.exit(f"No CHANGELOG entry found for {version}")
          body = m.group(1).strip()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("notes<<GHEOF\n")
              f.write(body)
              f.write("\nGHEOF\n")
          EOF
        env:
          TAG: ${{ github.ref_name }}

      - name: Create GitHub Release
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists, skipping"
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "${{ steps.notes.outputs.notes }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
